name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión sin v (ej. 0.1.0)'
        required: true
        default: '0.3.5'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EPUBLISH: never

      - name: Verify update metadata matches installer
        shell: pwsh
        run: |
          $pathLine = Get-Content release/latest.yml | Where-Object { $_ -match '^path:' } | Select-Object -First 1
          if (-not $pathLine) { throw 'latest.yml no contiene path' }
          $expected = ($pathLine -replace '^path:\s*', '').Trim()
          if (-not (Test-Path "release/$expected")) {
            Write-Error "latest.yml apunta a '$expected' pero no existe en release/"
            Get-ChildItem release
            exit 1
          }
          Write-Host "OK: latest.yml -> $expected"

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ControlStock ${{ steps.tag.outputs.name }}
          generate_release_notes: false
          body: |
            ## ControlStock ${{ steps.tag.outputs.name }}

            Inventario offline entre celulares (hotspot P2P), APK Android y pulido del flujo de conteo sin red al PC.

            ### Nuevo
            - **Inventario offline:** sectores en modo OFFLINE, paquete en celular, conteo local y sync P2P por hotspot (puerto 3850)
            - **Comparación A + reconteo** en celular; import al PC y Comparación B vs sistema
            - **APK Capacitor Android** para terminal de bodega
            - **Escanear QR del compañero** al conectar sync P2P (IP manual sigue disponible)

            ### Mejorado
            - Sync P2P más robusto (reintentos, espera del host, recuperar comparación)
            - Banner de inventario compacto en móvil; edición de líneas en reconteo offline
            - Import al PC más seguro (verifica en servidor antes de borrar datos locales)
            - Limpieza de paquetes locales si la sesión ya no está activa en el PC

            ### Actualización
            - Desde **v0.2.7 o superior:** Configuración → Buscar actualizaciones
            - O instalá el `.exe` de este release manualmente
          files: |
            release/ControlStock-Setup-*.exe
            release/latest.yml
