name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión sin v (ej. 0.1.0)'
        required: true
        default: '0.3.11'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          EPUBLISH: never

      - name: Verify update metadata matches installer
        shell: pwsh
        run: |
          $pathLine = Get-Content release/latest.yml | Where-Object { $_ -match '^path:' } | Select-Object -First 1
          if (-not $pathLine) { throw 'latest.yml no contiene path' }
          $expected = ($pathLine -replace '^path:\s*', '').Trim()
          if (-not (Test-Path "release/$expected")) {
            Write-Error "latest.yml apunta a '$expected' pero no existe en release/"
            Get-ChildItem release
            exit 1
          }
          Write-Host "OK: latest.yml -> $expected"

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ControlStock ${{ steps.tag.outputs.name }}
          generate_release_notes: false
          body: |
            ## ControlStock ${{ steps.tag.outputs.name }}

            Mejoras de navegación, rendimiento y clasificación del conteo de inventario.

            ### Mejorado
            - Paginación de los listados de **Productos** y **Consulta**
            - Código interno de producto más visible y estado activo/inactivo junto a Editar
            - Navegación por teclado en el listado de inventarios
            - Nuevos sectores de inventario configurados como **Offline** por defecto
            - Selector obligatorio de ubicación durante el conteo cuando el sector utiliza ubicaciones

            ### Corregido
            - Se evita el parpadeo de sectores al actualizar el Inventario en la APK
            - Compatibilidad entre frontend y servidor durante actualizaciones parciales

            ### Actualización
            - Desde **v0.2.7 o superior:** Configuración → Buscar actualizaciones
            - O instalá el `.exe` de este release manualmente
          files: |
            release/ControlStock-Setup-*.exe
            release/latest.yml
